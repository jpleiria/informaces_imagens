<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem em Ecrã Total</title>
    <style>
        /* Remove as margens padrão do navegador e esconde as barras de rolagem */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fundo preto para caso a imagem mude de proporção */
        }

        /* Faz a imagem cobrir todo o ecrã */
     .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: fill;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Substitua "siops_prontidao.png" pelo nome exato do seu arquivo na raiz -->
    <img src="siops_prontidao.png" alt="Imagem em Ecrã Total" class="fullscreen-bg">

<script>
        /* Força as dimensões reais do ecrã, ignorando o chrome do browser */
        const img = document.getElementById('img');
        img.style.width  = screen.width  + 'px';
        img.style.height = screen.height + 'px';
    </script>

</body>
</html>
