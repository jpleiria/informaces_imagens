<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem em Ecrã Total</title>
    <style>
        /* Remove as margens padrão do navegador e esconde as barras de rolagem */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fundo preto para caso a imagem mude de proporção */
        }

        /* Faz a imagem cobrir todo o ecrã */
        .fullscreen-bg {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Preenche o ecrã sem distorcer (pode cortar as bordas se a proporção for diferente) */
            object-position: center; /* Mantém o centro da imagem focado */
        }
    </style>
</head>
<body>

    <!-- Substitua "SIOPS_Prontidao.png" pelo nome exato do seu arquivo na raiz -->
    <img src="imagem.png" alt="Imagem em Ecrã Total" class="fullscreen-bg">

</body>
</html>
